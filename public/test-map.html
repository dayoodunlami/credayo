<!DOCTYPE html>
<html>
<head>
    <title>MapTiler Test</title>
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.8.0/maptiler-sdk.umd.js"></script>
    <link href="https://cdn.maptiler.com/maptiler-sdk-js/v3.8.0/maptiler-sdk.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; }
        #map { width: 100%; height: 400px; }
    </style>
</head>
<body>
    <h1>MapTiler SDK Test</h1>
    <div id="map"></div>
    
    <script>
        maptilersdk.config.apiKey = '9TGjdYW7sdX8esnxc6jG';
        
        const map = new maptilersdk.Map({
            container: 'map',
            style: 'https://api.maptiler.com/maps/streets-v2/style.json?key=9TGjdYW7sdX8esnxc6jG',
            center: [-0.1276, 51.5074],
            zoom: 10
        });
        
        map.on('load', () => {
            console.log('✅ HTML test map loaded!');
        });
        
        map.on('error', (e) => {
            console.error('❌ HTML test map error:', e);
        });
    </script>
</body>
</html>
